name: Hello Maestro — CI

on:
  push:
    paths:
      - 'exercicios/00-hello-maestro/pratica/flows/**'
  pull_request:
    paths:
      - 'exercicios/00-hello-maestro/pratica/flows/**'

permissions:
  pull-requests: write

jobs:
  maestro:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install Maestro CLI
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Enable KVM (Android emulator speed)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Maestro flows on Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: default
          arch: x86_64
          profile: pixel_6
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: bash exercicios/00-hello-maestro/pratica/run-tests.sh

      - name: Upload screenshots + results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: maestro-results
          path: |
            results.xml
            *.png
            installed-packages.txt

      - name: Comment PR with result
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let summary = '';
            try {
              const xml = fs.readFileSync('results.xml', 'utf8');
              const tests = (xml.match(/tests="(\d+)"/)?.[1]) || '?';
              const failures = (xml.match(/failures="(\d+)"/)?.[1]) || '?';
              const passed = parseInt(tests) - parseInt(failures);
              const icon = failures === '0' ? '✅' : '❌';
              summary = `${icon} **Hello Maestro:** ${passed}/${tests} flows passaram`;
            } catch {
              summary = '⚠️ Não foi possível ler results.xml';
            }

            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = `## 🤖 Maestro CI\n\n${summary}\n\n📦 [Ver screenshots e resultados completos](${runUrl})`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes('🤖 Maestro CI'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
