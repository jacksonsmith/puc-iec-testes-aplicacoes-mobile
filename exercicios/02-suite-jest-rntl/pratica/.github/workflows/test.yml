name: Atividade 2 — Unit (Parte A) + Integracao (Parte B) — Testes Mobile

on:
  push:                 # qualquer branch do próprio repo
  pull_request_target:  # PRs de forks — roda sem aprovação manual

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # pull_request_target roda no contexto da base — precisa fazer checkout
          # explícito do HEAD do PR pra rodar o código do aluno
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Rodar testes
        # --forceExit: a suíte de integração (react-query/timers) pode deixar handles
        # abertos e não encerrar o processo mesmo com todos os testes verdes.
        run: npm test -- --json --outputFile=results.json --passWithNoTests --forceExit

      - name: Parte A — mínimo de testes unitários verdes
        run: |
          TESTS_PASSED=$(jq '.numPassedTests' results.json)
          TESTS_TOTAL=$(jq '.numTotalTests' results.json)
          echo "Total verde no projeto: $TESTS_PASSED / $TESTS_TOTAL"
          MIN_REQUIRED=14
          if [ "$TESTS_PASSED" -lt "$MIN_REQUIRED" ]; then
            echo "❌ Parte A: mínimo $MIN_REQUIRED testes verdes (encontrado: $TESTS_PASSED)"
            echo "   Esperado: favoritesStore (6) + MovieCard RNTL (2) + isTokenError (5) + counterStore (3)"
            exit 1
          fi
          echo "✅ Parte A: atende o mínimo de $MIN_REQUIRED testes"

      - name: Parte B — entrega de integração verde
        run: |
          # Conta as asserções verdes do arquivo de entrega da Parte B (são 4:
          # lista aparece por texto + por role + favoritar ♥1 + desfavoritar ♥0).
          PARTEB=$(jq '[.testResults[]
            | select(.name | endswith("movieFlow.integration.test.tsx"))
            | .assertionResults[] | select(.status=="passed")] | length' results.json)
          echo "Integração (movieFlow) verde: $PARTEB / 4"
          if [ "$PARTEB" -lt 4 ]; then
            echo "❌ Parte B: os 4 testes de movieFlow.integration.test.tsx precisam passar"
            echo "   (lista por texto · lista por role · favoritar → ♥ 1 · desfavoritar → ♥ 0)"
            exit 1
          fi
          echo "✅ Parte B: entrega de integração completa"

      - name: Cobertura Parte A (store + utils ≥ 70%)
        run: npm run test:coverage -- --collectCoverageFrom='src/store/**' --collectCoverageFrom='src/utils/**'
